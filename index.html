<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMCI License Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #f8fafc;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --success: #10b981;
      --input-bg: #f8fafc;
      --glow: 0 0 15px rgba(59, 130, 246, 0.2);
    }

    * { box-sizing: border-box; }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #f1f5f9;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .page-header {
      width: 100%;
      max-width: 1300px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .page-header .logo-container {
      display: flex;
      justify-content: flex-start;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
      font-family: 'Outfit', 'Inter', sans-serif;
      letter-spacing: -0.03em;
      text-align: center;
    }
    
    @media (max-width: 768px) {
      .page-header {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
    }

    .wrap {
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 32px 40px;
      border-radius: 24px;
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
      animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 24px;
    }

    .user-actions { display: flex; align-items: center; gap: 12px; }

    .user-id {
      font-weight: 600;
      font-size: 0.85rem;
      background: #f1f5f9;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      color: var(--text-main);
    }

    .icon-btn, .outline {
      border: 1px solid var(--card-border);
      background: #ffffff;
      color: var(--text-main);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn { width: 40px; height: 40px; }
    .icon-btn svg { fill: var(--text-muted); transition: fill 0.2s; }
    
    .outline { padding: 8px 16px; font-size: 0.9rem; }

    .icon-btn:hover, .outline:hover {
      background: #f8fafc;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .icon-btn:hover svg { fill: var(--text-main); }

    .sub {
      color: var(--text-muted);
      margin: -10px 0 24px;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    label {
      font-weight: 500;
      font-size: 0.85rem;
      display: block;
      margin-top: 16px;
      color: #475569;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), inset 0 1px 2px rgba(0,0,0,0.02);
    }
    
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    button.primary {
      margin-top: 24px;
      padding: 14px 24px;
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, #60a5fa 100%);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      position: relative;
      overflow: hidden;
    }

    button.primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.5s ease;
    }

    button.primary:hover::before {
      left: 100%;
    }

    button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }
    
    button.primary:active {
      transform: translateY(1px);
    }

    .note { margin-top: 14px; color: var(--text-muted); font-size: 0.9rem; }
    
    .pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      font-weight: 600;
      font-size: 0.8rem;
      margin: 0 4px;
    }

    .grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; align-items: start; }
    
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      position: relative;
    }
    
    .history {
      overflow-x: auto;
    }

    .history table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 16px; font-size: 0.85rem; min-width: 700px; }
    .history th { 
      text-align: left; 
      padding: 12px 16px; 
      color: var(--text-muted); 
      font-weight: 500; 
      border-bottom: 1px solid var(--card-border); 
      background: #f8fafc;
    }
    .history th:first-child { border-top-left-radius: 8px; border-left: 1px solid var(--card-border); border-top: 1px solid var(--card-border); }
    .history th:last-child { border-top-right-radius: 8px; border-right: 1px solid var(--card-border); border-top: 1px solid var(--card-border); }
    .history th:not(:first-child):not(:last-child) { border-top: 1px solid var(--card-border); }
    
    .history td { 
      padding: 14px 16px; 
      border-bottom: 1px solid var(--card-border); 
      transition: background 0.2s;
    }
    
    .history tbody tr { border-left: 1px solid transparent; border-right: 1px solid transparent; }
    
    .history tr:last-child td { border-bottom: 1px solid var(--card-border); }
    .history tr:last-child td:first-child { border-bottom-left-radius: 8px; }
    .history tr:last-child td:last-child { border-bottom-right-radius: 8px; }
    
    .history tbody tr:hover td {
      background: #f8fafc;
    }

    .controls { display: flex; gap: 12px; align-items: center; margin-top: 16px; justify-content: space-between; }
    .controls input { width: 100%; max-width: 300px; padding: 10px 14px; }
    .controls button { margin-top: 0; padding: 10px 16px; width: auto; }
    .controls .outline { padding: 8px 16px; margin: 0; }
    
    #pageInfo { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }

    .hidden { display: none !important; }

    .alert {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-weight: 500;
      font-size: 0.9rem;
      animation: slideUpFade 0.3s ease forwards;
    }

    /* Modal Styling */
    .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal-backdrop { 
      position: absolute; 
      inset: 0; 
      background: rgba(0,0,0,0.3); 
      backdrop-filter: blur(2px);
    }
    
    .modal-card {
      position: relative;
      background: var(--card-bg);
      padding: 32px;
      border-radius: 20px;
      width: 400px;
      max-width: 90vw;
      border: 1px solid var(--card-border);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .modal-header { font-weight: 700; font-size: 1.25rem; color: var(--text-main); margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
    .modal-actions button { margin-top: 0; width: auto; }

    #loginView {
      max-width: 400px;
      margin: 40px auto;
    }
    
    #loginView .card {
      padding: 32px;
    }
    
    /* Dynamic specific elements */
    #genMsg {
      color: var(--success);
      font-weight: 500;
      margin-top: 16px;
      text-align: center;
    }
    
    #currentUser {
      color: #60a5fa;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spinner {
      width: 48px; height: 48px; border: 4px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;
    }
    .download-card {
      margin-top: 24px;
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
    }
    .download-text {
      color: var(--text-muted);
      margin: 12px 0 18px;
      line-height: 1.6;
    }
    .download-link {
      display: inline-block;
      text-decoration: none;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 12px 18px;
      border-radius: 12px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .download-link:hover {
      background: var(--accent);
      color: white;
    }
    #loadingView { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: var(--text-muted); font-weight: 500; font-size: 1.1rem;}
  </style>
</head>
<body>
  <div class="page-header">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" style="height:48px;">
    </div>
    <div class="page-title">SMCI License Generator</div>
    <div></div>
  </div>
  <div class="wrap">
    <div class="header hidden" id="appHeader">
      <div class="user-actions" id="userActions">
        <span class="user-id" id="currentUser">--</span>
        <button class="icon-btn" onclick="openPasswordModal()" title="Update Password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3a4 4 0 0 1 4 4v2h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2V7a4 4 0 0 1 4-4Zm-2 6h4V7a2 2 0 1 0-4 0v2Z" fill="#4c8bf5"/>
          </svg>
        </button>
        <button class="outline" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="loginView">
      <div class="card">
        <label>User ID</label>
        <input id="loginUser" />
        <label>Password</label>
        <input id="loginPass" type="password" />
        <button class="primary" onclick="login()" id="loginBtn">Login</button>
        <div class="alert hidden" id="loginAlert"></div>
      </div>
      <div class="card download-card">
        <div class="note">The zip contains the SMCI Application.</div>
        <p class="download-text">Enter the login password to unlock the secure app download.</p>
        <button class="outline download-link" onclick="openDownloadModal()">Download file</button>
      </div>
    </div>

    <div id="loadingView" class="hidden">
      <div class="spinner"></div>
      <div>Loading your secure data...</div>
    </div>

    <div id="appView" class="hidden">
      <div class="grid">
        <div class="card">
          <div class="note">License ID: <span class="pill" id="nextId">SMCI-CLIENT-01</span></div>
          <label>Name</label>
          <input id="name" />
          <label>Contact (email or phone)</label>
          <input id="contact" />
          <label>Event/Organization</label>
          <input id="organization" />
          <label>Valid Till</label>
          <input id="expiry" type="date" />
          <button class="primary" onclick="generate()">Generate License</button>
          <div class="alert hidden" id="genAlert"></div>
          <div class="note" id="genMsg"></div>
        </div>

        <div class="card history">
          <div class="controls">
            <input id="search" placeholder="Search license, name, org, contact" />
            <button class="primary" onclick="loadHistory(1)">Search</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>License ID</th>
                <th>Name</th>
                <th>Event/Org</th>
                <th>Contact</th>
                <th>Valid Till</th>
                <th>Issued At</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
          <div class="controls">
            <button class="outline" onclick="prevPage()">Prev</button>
            <div id="pageInfo"></div>
            <button class="outline" onclick="nextPage()">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="passwordModal">
    <div class="modal-backdrop" onclick="closePasswordModal()"></div>
    <div class="modal-card">
      <div class="modal-header">Update Password</div>
      <label>Current Password</label>
      <input id="currentPass" type="password" />
      <label>New Password</label>
      <input id="newPass" type="password" />
      <div class="modal-actions">
        <button class="outline" onclick="closePasswordModal()">Cancel</button>
        <button class="primary" onclick="updatePassword()">Update</button>
      </div>
      <div class="alert hidden" id="passAlert"></div>
    </div>
  </div>

  <div class="modal hidden" id="downloadModal">
    <div class="modal-backdrop" onclick="closeDownloadModal()"></div>
    <div class="modal-card">
      <div class="modal-header">Confirm Download</div>
      <label>Enter a valid SMCI user password</label>
      <input id="downloadPassword" type="password" />
      <div class="modal-actions">
        <button class="outline" onclick="closeDownloadModal()">Cancel</button>
        <button class="primary" onclick="downloadWithPassword()">Download file</button>
      </div>
      <div class="alert hidden" id="downloadAlert"></div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let pageSize = 10;
    let totalCount = 0;
    let loginPasswordCache = '';

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideAlert(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add('hidden');
      el.textContent = '';
    }

    function setExpiryMinToday() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const min = `${yyyy}-${mm}-${dd}`;
      const exp = document.getElementById('expiry');
      if (exp) exp.setAttribute('min', min);
    }

    function isValidContact(value) {
      const email = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phone = /^[+]?\d[\d\s\-()]{6,}$/;
      return email.test(value) || phone.test(value);
    }

    function resetLoginFields() {
      const u = document.getElementById('loginUser');
      const p = document.getElementById('loginPass');
      if (u) u.value = '';
      if (p) p.value = '';
      hideAlert('loginAlert');
    }

    async function checkAuth() {
      const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
      const data = await res.json();
      if (data.authenticated) {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('appHeader').classList.add('hidden');
        document.getElementById('loadingView').classList.remove('hidden');
        
        document.getElementById('currentUser').textContent = data.user_id;
        setExpiryMinToday();
        await refreshNextId();
        await loadHistory(1);
        
        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('appHeader').classList.remove('hidden');
        document.getElementById('appView').classList.remove('hidden');
      } else {
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('appHeader').classList.add('hidden');
        document.getElementById('loadingView').classList.add('hidden');
      }
    }

    async function login() {
      hideAlert('loginAlert');
      const user_id = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value.trim();
      if (!user_id || !password) {
        showAlert('loginAlert', 'All fields are required');
        return;
      }
      
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.innerText = 'Logging in...';
      
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ user_id, password })
      });
      const data = await res.json();
      loginBtn.innerText = 'Login';
      
      if (!data.success) {
        showAlert('loginAlert', data.error || 'Login failed');
        return;
      }
      loginPasswordCache = password;
      await checkAuth();
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
      loginPasswordCache = '';
      resetLoginFields();
      await checkAuth();
    }

    function openPasswordModal() {
      hideAlert('passAlert');
      document.getElementById('passwordModal').classList.remove('hidden');
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.add('hidden');
    }

    function openDownloadModal() {
      hideAlert('downloadAlert');
      const input = document.getElementById('downloadPassword');
      if (input) input.value = '';
      document.getElementById('downloadModal').classList.remove('hidden');
    }

    function closeDownloadModal() {
      document.getElementById('downloadModal').classList.add('hidden');
    }

    async function downloadWithPassword() {
      hideAlert('downloadAlert');
      const entered = document.getElementById('downloadPassword').value.trim();
      if (!entered) {
        showAlert('downloadAlert', 'Password is required');
        return;
      }
      const res = await fetch('/api/download/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: entered })
      });
      const data = await res.json();
      if (!data.success) {
        showAlert('downloadAlert', data.error || 'Password not recognized');
        return;
      }
      closeDownloadModal();
      const a = document.createElement('a');
      a.href = '/smci_app_secure.zip';
      a.download = '@smci_app_secure.zip';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    async function updatePassword() {
      hideAlert('passAlert');
      const current_password = document.getElementById('currentPass').value.trim();
      const new_password = document.getElementById('newPass').value.trim();
      if (!current_password || !new_password) {
        showAlert('passAlert', 'All fields are required');
        return;
      }
      const res = await fetch('/api/auth/update_password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ current_password, new_password })
      });
      const data = await res.json();
      if (!data.success) {
        showAlert('passAlert', data.error || 'Update failed');
        return;
      }
      document.getElementById('currentPass').value = '';
      document.getElementById('newPass').value = '';
      showAlert('passAlert', 'Password updated');
    }

    async function refreshNextId() {
      const res = await fetch('/api/licenses/next', { credentials: 'same-origin' });
      const data = await res.json();
      if (data.success) {
        document.getElementById('nextId').textContent = data.next_id;
        // Total removed from display
      }
    }

    function dateToMMDDYYYY(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return '';
      return `${parts[1]}-${parts[2]}-${parts[0]}`;
    }

    async function generate() {
      hideAlert('genAlert');
      document.getElementById('genMsg').textContent = '';
      const name = document.getElementById('name').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const organization = document.getElementById('organization').value.trim();
      const expiryRaw = document.getElementById('expiry').value.trim();
      if (!name || !contact || !organization || !expiryRaw) {
        showAlert('genAlert', 'All fields are required');
        return;
      }
      if (!isValidContact(contact)) {
        showAlert('genAlert', 'Invalid contact (email or phone)');
        return;
      }
      const expDate = new Date(expiryRaw);
      const today = new Date();
      today.setHours(0,0,0,0);
      if (expDate < today) {
        showAlert('genAlert', 'Expiry must be today or later');
        return;
      }
      const expiry = dateToMMDDYYYY(expiryRaw);
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ name, contact, organization, expiry })
      });
      if (!res.ok || res.headers.get('content-type')?.includes('application/json')) {
        const data = await res.json();
        showAlert('genAlert', data.error || 'Failed to generate license');
        return;
      }
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const licenseId = res.headers.get('x-license-id') || 'license';
      a.download = `${licenseId}.lic`;
      a.click();
      window.URL.revokeObjectURL(url);

      document.getElementById('genMsg').textContent = `License generated: ${licenseId}`;
      document.getElementById('name').value = '';
      document.getElementById('contact').value = '';
      document.getElementById('organization').value = '';
      document.getElementById('expiry').value = '';

      await refreshNextId();
      await loadHistory(1);
    }

    async function loadHistory(page) {
      currentPage = page;
      const search = document.getElementById('search').value.trim();
      const res = await fetch(`/api/licenses?search=${encodeURIComponent(search)}&page=${page}&page_size=${pageSize}`, { credentials: 'same-origin' });
      const data = await res.json();
      if (!data.success) return;
      totalCount = data.total;
      const tbody = document.getElementById('historyBody');
      tbody.innerHTML = '';
      for (const item of data.items) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.license_id || ''}</td>
          <td>${item.name || ''}</td>
          <td>${item.organization || ''}</td>
          <td>${item.contact || ''}</td>
          <td>${item.expiry || ''}</td>
          <td>${item.issued_at || ''}</td>
          <td><button class="pill" style="cursor:pointer; border:none; margin:0;" onclick="reissue('${item.license_id}')">Reissue</button></td>
        `;
        tbody.appendChild(tr);
      }
      const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
      document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
    }

    function prevPage() {
      if (currentPage > 1) loadHistory(currentPage - 1);
    }

    function nextPage() {
      const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
      if (currentPage < totalPages) loadHistory(currentPage + 1);
    }

    async function reissue(licenseId) {
      const btn = event.target;
      btn.innerText = '...';
      const res = await fetch('/api/reissue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ license_id: licenseId })
      });
      if (!res.ok || res.headers.get('content-type')?.includes('application/json')) {
        const data = await res.json();
        alert(data.error || 'Failed to reissue license');
        btn.innerText = 'Reissue';
        return;
      }
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${licenseId}.lic`;
      a.click();
      window.URL.revokeObjectURL(url);
      btn.innerText = 'Reissued!';
      setTimeout(() => { btn.innerText = 'Reissue'; }, 2000);
    }

    checkAuth();
  </script>
</body>
</html>
